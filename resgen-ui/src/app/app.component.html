<!-- component.html -->
<div *ngIf="isLoading" class="fixed top-0 left-0 w-full h-1 bg-blue-500 animate-pulse">
    <div class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="p-5 bg-white rounded-lg shadow-lg">
            <div class="flex items-center space-x-2">
                <svg class="w-6 h-6 text-blue-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v2m0 12v2m8-10h-2M6 12H4m14.36-6.36l-1.42 1.42M7.05 18.36l-1.42-1.42m12.73 0l-1.42-1.42M7.05 5.64l-1.42 1.42"></path>
                </svg>
                <span class="text-lg font-medium text-gray-700">Loading...</span>
            </div>
        </div>
    </div>
</div>
<div *ngIf="!isLoading">
    <nav class="fixed top-0 z-50 w-full bg-slate-50 border-b border-gray-200 dark:bg-gray-800 dark:border-gray-700">
        <div class="px-3 py-3 lg:px-5 lg:pl-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center justify-start rtl:justify-end">
                    <button id="side-bar-button" data-drawer-target="logo-sidebar" data-drawer-toggle="logo-sidebar" aria-controls="logo-sidebar" type="button" class="inline-flex items-center p-2 text-sm text-gray-500 rounded-lg sm:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600">
                        <span class="sr-only">Open sidebar</span>
                        <svg class="w-6 h-6" aria-hidden="true" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path clip-rule="evenodd" fill-rule="evenodd" d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"></path>
                        </svg>
                    </button>
                    <a (click)="openHomeTab()" class="flex items-center ms-2 md:me-24 cursor-pointer group">
                        <span class="flex h-9 w-9 items-center justify-center rounded-lg bg-slate-50 shadow-sm ring-1 ring-gray-200 transition-transform group-hover:scale-105 dark:bg-gray-100 dark:ring-gray-300">
                            <img src="/assets/logo.png" class="h-6 w-6 object-contain" alt="Resgen logo" />
                        </span>
                        <span class="ms-2.5 text-xl sm:text-2xl font-bold tracking-tight whitespace-nowrap bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent" style="font-family: 'Space Grotesk', system-ui, sans-serif;">
                            Resgen
                        </span>
                    </a>
                </div>
                <div class="flex items-center">
                    <div *ngIf="isAuthenticated" class="flex items-center ms-3">
                        <button type="button"
                            class="flex items-center gap-2 rounded-full p-0.5 pr-3 bg-gray-50 hover:bg-gray-100 border border-gray-200 hover:border-gray-300 focus:ring-4 focus:ring-gray-200 transition-colors cursor-pointer dark:bg-gray-700 dark:hover:bg-gray-600 dark:border-gray-600 dark:focus:ring-gray-600"
                            aria-expanded="false" data-dropdown-toggle="dropdown-user">
                            <span class="sr-only">Open user menu</span>
                            <img *ngIf="userImageUrl" class="w-8 h-8 rounded-full object-cover bg-white" [src]="userImageUrl" alt="user photo" referrerpolicy="no-referrer" (error)="onUserImageError()" />
                            <span *ngIf="!userImageUrl" class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 text-white text-xs font-semibold">
                                {{ userInitials }}
                            </span>
                            <span class="hidden sm:inline text-sm font-medium text-gray-700 max-w-[120px] truncate dark:text-gray-200">{{ user.name || 'Account' }}</span>
                            <svg class="hidden sm:block w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <div class="z-50 hidden my-2 text-base list-none bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden min-w-[240px] dark:bg-gray-800 dark:border-gray-700" id="dropdown-user">
                            <div class="px-4 py-3 flex items-center gap-3 bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-800 dark:to-gray-800" role="none">
                                <img *ngIf="userImageUrl" class="w-10 h-10 rounded-full object-cover bg-white flex-shrink-0" [src]="userImageUrl" alt="user photo" referrerpolicy="no-referrer" (error)="onUserImageError()" />
                                <span *ngIf="!userImageUrl" class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 text-white text-sm font-semibold flex-shrink-0">
                                    {{ userInitials }}
                                </span>
                                <div class="min-w-0">
                                    <p class="text-sm font-semibold text-gray-900 truncate dark:text-white" role="none">{{ user.name }}</p>
                                    <p class="text-xs text-gray-500 truncate dark:text-gray-400" role="none">{{ user.email }}</p>
                                </div>
                            </div>
                            <ul class="py-1.5" role="none">
                                <li>
                                    <a (click)="openAccountTab()" role="menuitem"
                                        class="flex items-center gap-2.5 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 cursor-pointer dark:text-gray-200 dark:hover:bg-gray-700/60">
                                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a7.5 7.5 0 1 1 15 0" />
                                        </svg>
                                        Account
                                    </a>
                                </li>
                            </ul>
                            <div class="border-t border-gray-100 dark:border-gray-700 py-1.5">
                                <a (click)="logout()" role="menuitem"
                                    class="flex items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 cursor-pointer dark:text-red-400 dark:hover:bg-red-900/20">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                    Sign out
                                </a>
                            </div>
                        </div>
                    </div>
                    <button *ngIf="!isAuthenticated" (click)="login()" type="button"
                        class="ml-4 inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-300 transition-colors cursor-pointer dark:focus:ring-blue-800">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                        </svg>
                        Login
                    </button>
                </div>
            </div>
        </div>
    </nav>
        <aside id="logo-sidebar"
            class="fixed top-0 left-0 z-40 w-64 h-screen pt-20 transition-transform -translate-x-full bg-slate-50 border-r border-gray-200 sm:translate-x-0 dark:bg-gray-800 dark:border-gray-700"
            aria-label="Sidebar">
            <div class="h-full flex flex-col px-3 pb-4 overflow-y-auto bg-slate-50 dark:bg-gray-800">
                <ul class="space-y-1 pt-3">
                    <li>
                        <a (click)="openHomeTab()"
                            [ngClass]="selectedTab === 'home'
                                ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'
                                : 'text-gray-700 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700/60'"
                            class="relative flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                            <span *ngIf="selectedTab === 'home'" class="absolute left-0 top-1/2 -translate-y-1/2 h-6 w-1 rounded-r bg-blue-600 dark:bg-blue-400"></span>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                                [ngClass]="selectedTab === 'home' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-200'"
                                stroke="currentColor" class="w-5 h-5 transition-colors">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                            </svg>
                            <span class="ms-3">Home</span>
                        </a>
                    </li>
                    <li>
                        <a (click)="openProfilesTab()"
                            [ngClass]="selectedTab === 'profiles'
                                ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'
                                : 'text-gray-700 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700/60'"
                            class="relative flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                            <span *ngIf="selectedTab === 'profiles'" class="absolute left-0 top-1/2 -translate-y-1/2 h-6 w-1 rounded-r bg-blue-600 dark:bg-blue-400"></span>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                                [ngClass]="selectedTab === 'profiles' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-200'"
                                stroke="currentColor" class="w-5 h-5 transition-colors">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
                            </svg>
                            <span class="flex-1 ms-3 whitespace-nowrap">Profiles</span>
                        </a>
                    </li>
                    <li>
                        <a (click)="openResumesTab()"
                            [ngClass]="selectedTab === 'resumes'
                                ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'
                                : 'text-gray-700 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700/60'"
                            class="relative flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                            <span *ngIf="selectedTab === 'resumes'" class="absolute left-0 top-1/2 -translate-y-1/2 h-6 w-1 rounded-r bg-blue-600 dark:bg-blue-400"></span>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                                [ngClass]="selectedTab === 'resumes' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-200'"
                                stroke="currentColor" class="w-5 h-5 transition-colors">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z" />
                            </svg>
                            <span class="flex-1 ms-3 whitespace-nowrap">Resumes</span>
                        </a>
                    </li>
                    <li>
                        <a (click)="openAccountTab()"
                            [ngClass]="selectedTab === 'account'
                                ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'
                                : 'text-gray-700 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700/60'"
                            class="relative flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                            <span *ngIf="selectedTab === 'account'" class="absolute left-0 top-1/2 -translate-y-1/2 h-6 w-1 rounded-r bg-blue-600 dark:bg-blue-400"></span>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                                [ngClass]="selectedTab === 'account' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-200'"
                                stroke="currentColor" class="w-5 h-5 transition-colors">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                            <span class="flex-1 ms-3 whitespace-nowrap">Account</span>
                        </a>
                    </li>
                    <li *ngIf="isAdmin">
                        <a (click)="openAdminTab()"
                            [ngClass]="selectedTab === 'admin'
                                ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300'
                                : 'text-gray-700 hover:bg-gray-50 dark:text-gray-300 dark:hover:bg-gray-700/60'"
                            class="relative flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer group">
                            <span *ngIf="selectedTab === 'admin'" class="absolute left-0 top-1/2 -translate-y-1/2 h-6 w-1 rounded-r bg-indigo-600 dark:bg-indigo-400"></span>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                                [ngClass]="selectedTab === 'admin' ? 'text-indigo-600 dark:text-indigo-400' : 'text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-200'"
                                stroke="currentColor" class="w-5 h-5 transition-colors">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 12.75 11.25 15 15 9.75M3.75 12a8.25 8.25 0 1 1 16.5 0 8.25 8.25 0 0 1-16.5 0Z" />
                            </svg>
                            <span class="flex-1 ms-3 whitespace-nowrap">Admin</span>
                            <span class="ms-auto inline-flex items-center rounded-full bg-indigo-100 px-2 py-0.5 text-[10px] font-semibold text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300">admin</span>
                        </a>
                    </li>
                </ul>

                <!-- Footer -->
                <div class="mt-auto pt-4 border-t border-gray-100 dark:border-gray-700">
                    <div class="flex items-center justify-between px-2 text-[11px] text-gray-400 dark:text-gray-500">
                        <span class="font-medium">v3.0.0</span>
                        <span>&#64;lostguid</span>
                    </div>
                </div>
            </div>
        </aside>
    
        <div *ngIf="!shouldCheckAuthentication() || isAuthenticated" class="p-2 mt-11 sm:ml-64">
            <router-outlet></router-outlet>
        </div>
</div>
